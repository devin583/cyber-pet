name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:   # 也可在 Actions 页面手动触发(只产出构建产物,不发 Release)

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: --win
          - os: macos-latest
            args: --mac
    runs-on: ${{ matrix.os }}
    env:
      # CI 上没有签名证书,跳过 mac 代码签名(产物为未签名 dmg)
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx electron-builder ${{ matrix.args }} --publish never

      - name: 上传到 GitHub Release(tag 触发时)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.dmg
          generate_release_notes: true

      - name: 上传构建产物(手动触发时)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
